services:
  app:
    build:
      context: .
      target: production        # ✅ ระบุ stage ให้ชัด
    container_name: finance_app
    ports:
      - "127.0.0.1:5001:5001"  # ✅ ดีแล้ว bind localhost only
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - REDIS_URL=redis://redis:6379  # ✅ ชี้ไป redis container
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy  # ✅ รอ redis healthy ก่อน
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: finance_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:                    # ✅ health check redis
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data: